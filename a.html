<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arrange the Sentence — Be Going To</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF8EC;
    --board-green:#2F6B4F;
    --board-green-light:#3C8163;
    --chalk-yellow:#FFD56B;
    --chalk-pink:#FF9EB5;
    --chalk-blue:#7FD1E0;
    --chalk-purple:#C6A6E8;
    --ink:#2E2A26;
    --correct:#4CAF7D;
    --incorrect:#E96A6A;
    --card-shadow: 0 4px 0 rgba(0,0,0,0.12);
    --radius-lg: 22px;
    --radius-md: 16px;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    background: var(--cream);
    background-image:
      radial-gradient(circle at 8% 12%, rgba(255,213,107,0.25) 0, transparent 45%),
      radial-gradient(circle at 92% 18%, rgba(127,209,224,0.25) 0, transparent 40%),
      radial-gradient(circle at 50% 95%, rgba(255,158,181,0.2) 0, transparent 45%);
    font-family: 'Quicksand', sans-serif;
    color: var(--ink);
    display:flex;
    justify-content:center;
    padding: 24px 16px 60px;
  }

  .stage{
    width: 100%;
    max-width: 980px;
  }

  header.title-block{
    text-align:center;
    margin-bottom: 18px;
  }

  header.title-block h1{
    font-family:'Baloo 2', sans-serif;
    font-size: clamp(28px, 4.5vw, 44px);
    margin: 0 0 4px;
    color: var(--board-green);
    letter-spacing: 0.5px;
  }

  header.title-block p{
    margin:0;
    font-weight:600;
    color: #6b6258;
    font-size: clamp(14px, 2vw, 17px);
  }

  .pencil-divider{
    width: 140px;
    height: 6px;
    margin: 10px auto 0;
    border-radius: 6px;
    background: repeating-linear-gradient(90deg, var(--chalk-pink) 0 14px, var(--chalk-yellow) 14px 28px, var(--chalk-blue) 28px 42px, var(--chalk-purple) 42px 56px);
  }

  /* Top bar: progress + score */
  .topbar{
    display:flex;
    align-items:center;
    justify-content: space-between;
    gap: 12px;
    margin: 18px 0 14px;
    flex-wrap: wrap;
  }

  .pill{
    background: white;
    border-radius: 999px;
    padding: 8px 18px;
    font-weight: 700;
    font-family: 'Baloo 2', sans-serif;
    box-shadow: var(--card-shadow);
    border: 2px solid #f0e6d2;
    font-size: 15px;
    display:flex;
    align-items:center;
    gap: 8px;
  }

  .pill.score{ color: var(--board-green); }
  .pill.progress{ color: #9b6b1f; }

  .pill .emoji{ font-size: 18px; }

  /* Word bank */
  .word-bank{
    position: relative;
    background: linear-gradient(180deg, var(--board-green) 0%, var(--board-green-light) 100%);
    border-radius: var(--radius-lg);
    padding: 14px;
    height: 210px;
    overflow: hidden;
    box-shadow: 0 8px 0 rgba(0,0,0,0.08), inset 0 0 0 6px rgba(255,255,255,0.08);
    border: 4px solid #1f4d38;
  }

  .word-bank::before{
    content: "WORD BANK";
    position: absolute;
    top: 10px;
    left: 16px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.55);
    font-weight: 700;
    z-index: 1;
  }

  .word-card{
    position: absolute;
    padding: 10px 18px;
    border-radius: var(--radius-md);
    font-family:'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 17px;
    cursor: grab;
    user-select: none;
    touch-action: none;
    box-shadow: var(--card-shadow);
    border: 2px solid rgba(0,0,0,0.08);
    transition: transform 0.12s ease;
    white-space: nowrap;
    z-index: 2;
  }

  .word-card:active{ cursor: grabbing; }

  .word-card.dragging{
    transform: scale(1.12);
    box-shadow: 0 10px 18px rgba(0,0,0,0.25);
    z-index: 50;
  }

  .word-card.placed{
    position: relative;
    transform: none !important;
  }

  .word-card.c0{ background: var(--chalk-yellow); }
  .word-card.c1{ background: var(--chalk-pink); }
  .word-card.c2{ background: var(--chalk-blue); }
  .word-card.c3{ background: var(--chalk-purple); }
  .word-card.c4{ background: #B7E3A5; }

  /* Answer / sentence drop zone */
  .answer-zone-label{
    margin: 22px 0 8px;
    font-family:'Baloo 2', sans-serif;
    font-weight: 700;
    color: #6b6258;
    font-size: 15px;
    letter-spacing: 1px;
    text-align:center;
  }

  .answer-zone{
    min-height: 110px;
    background: white;
    border: 4px dashed #d8c9a3;
    border-radius: var(--radius-lg);
    display:flex;
    flex-wrap: wrap;
    align-items:center;
    gap: 10px;
    padding: 16px;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.04);
    transition: border-color 0.2s, background 0.2s;
  }

  .answer-zone.drag-over{
    border-color: var(--board-green);
    background: #f3fbf6;
  }

  .answer-zone.correct{
    border-color: var(--correct);
    background: #effaf2;
  }

  .answer-zone.incorrect{
    border-color: var(--incorrect);
    background: #fdf0f0;
    animation: shake 0.4s ease;
  }

  @keyframes shake{
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  .answer-zone .placeholder{
    color: #c9bfa9;
    font-weight: 600;
    font-size: 15px;
    margin: auto;
  }

  .slot{
    width: 14px;
    height: 44px;
    border-bottom: 3px solid #e7dcc0;
    flex: 0 0 auto;
  }

  /* Feedback banner */
  .feedback{
    text-align:center;
    font-family:'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 19px;
    min-height: 30px;
    margin-top: 12px;
    transition: opacity 0.2s;
  }

  .feedback.correct{ color: var(--correct); }
  .feedback.incorrect{ color: var(--incorrect); }

  /* Buttons */
  .controls{
    display:flex;
    justify-content:center;
    gap: 14px;
    margin-top: 18px;
    flex-wrap: wrap;
  }

  button{
    font-family:'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 16px;
    padding: 12px 26px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    box-shadow: var(--card-shadow);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    color: white;
  }

  button:hover{ transform: translateY(-2px); }
  button:active{ transform: translateY(1px); box-shadow: 0 1px 0 rgba(0,0,0,0.12); }

  button:focus-visible{
    outline: 3px solid #2E2A26;
    outline-offset: 2px;
  }

  button:disabled{
    opacity: 0.45;
    cursor: not-allowed;
    transform: none;
  }

  .btn-check{ background: var(--board-green); }
  .btn-reset{ background: #E8A33D; }
  .btn-next{ background: #6A8FE0; }

  footer.hint{
    text-align:center;
    margin-top: 22px;
    color: #a89c86;
    font-size: 13px;
    font-weight: 600;
  }

  @media (max-width: 600px){
    .word-bank{ height: 240px; }
    .word-card{ font-size: 15px; padding: 8px 14px; }
    button{ padding: 10px 20px; font-size: 14px; }
  }
</style>
</head>
<body>

<div class="stage">
  <header class="title-block">
    <h1>🌟 Arrange the Sentence</h1>
    <p>Catch the floating words and build sentences with <em>be going to</em>!</p>
    <div class="pencil-divider"></div>
  </header>

  <div class="topbar">
    <div class="pill progress"><span class="emoji">📘</span><span id="progress-label">Question 1 of 10</span></div>
    <div class="pill score"><span class="emoji">⭐</span><span id="score-label">Score: 0</span></div>
  </div>

  <div class="word-bank" id="wordBank"></div>

  <div class="answer-zone-label">👉 DROP YOUR WORDS HERE TO BUILD THE SENTENCE</div>
  <div class="answer-zone" id="answerZone">
    <span class="placeholder" id="answerPlaceholder">Drag words from the Word Bank above…</span>
  </div>

  <div class="feedback" id="feedback"></div>

  <div class="controls">
    <button class="btn-check" id="checkBtn">✅ Check</button>
    <button class="btn-reset" id="resetBtn">🔄 Reset</button>
    <button class="btn-next" id="nextBtn" disabled>➡️ Next Question</button>
  </div>

  <footer class="hint">Tip: drag a moving word card into the box, and it will freeze in place so you can arrange it!</footer>
</div>

<script>
(function(){
  // ---------- Question bank: "be going to" — affirmative, negative, question ----------
  const QUESTIONS = [
    { words: ["She", "is", "going", "to", "visit", "her", "grandmother"], type: "affirmative" },
    { words: ["They", "are", "not", "going", "to", "play", "football"], type: "negative" },
    { words: ["Are", "you", "going", "to", "study", "tonight", "?"], type: "question" },
    { words: ["I", "am", "going", "to", "bake", "a", "cake"], type: "affirmative" },
    { words: ["He", "is", "not", "going", "to", "watch", "TV"], type: "negative" },
    { words: ["What", "are", "you", "going", "to", "wear", "?"], type: "question" },
    { words: ["We", "are", "going", "to", "travel", "to", "Japan"], type: "affirmative" },
    { words: ["Is", "she", "going", "to", "join", "the", "club", "?"], type: "question" },
    { words: ["The", "boys", "are", "not", "going", "to", "clean", "their", "room"], type: "negative" },
    { words: ["I", "am", "going", "to", "call", "you", "later"], type: "affirmative" }
  ];

  // ---------- State ----------
  let order = shuffleIndices(QUESTIONS.length);
  let qIndex = 0;
  let score = 0;
  let placedWords = []; // array of {text, id} in the order placed
  let cards = []; // {id, text, el, x, y, vx, vy, w, h, placed}
  let answered = false;
  let rafId = null;

  const wordBank = document.getElementById('wordBank');
  const answerZone = document.getElementById('answerZone');
  const answerPlaceholder = document.getElementById('answerPlaceholder');
  const feedback = document.getElementById('feedback');
  const scoreLabel = document.getElementById('score-label');
  const progressLabel = document.getElementById('progress-label');
  const checkBtn = document.getElementById('checkBtn');
  const resetBtn = document.getElementById('resetBtn');
  const nextBtn = document.getElementById('nextBtn');

  const COLOR_CLASSES = ['c0','c1','c2','c3','c4'];

  function shuffleIndices(n){
    const arr = Array.from({length:n}, (_,i)=>i);
    for(let i=arr.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]] = [arr[j],arr[i]];
    }
    return arr;
  }

  function shuffleArray(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  // ---------- Build a question ----------
  function loadQuestion(){
    cancelAnimationFrame(rafId);
    answered = false;
    placedWords = [];
    cards = [];
    feedback.textContent = '';
    feedback.className = 'feedback';
    answerZone.classList.remove('correct','incorrect','drag-over');
    wordBank.innerHTML = '';
    answerZone.innerHTML = '';
    answerZone.appendChild(answerPlaceholder);
    answerPlaceholder.style.display = 'block';
    checkBtn.disabled = false;
    nextBtn.disabled = true;

    const qData = QUESTIONS[order[qIndex]];
    progressLabel.textContent = `Question ${qIndex+1} of ${QUESTIONS.length}`;

    const shuffledWords = shuffleArray(qData.words);

    // wait a tick so wordBank has real dimensions
    requestAnimationFrame(()=>{
      const bankRect = wordBank.getBoundingClientRect();
      shuffledWords.forEach((word, i) => {
        createCard(word, i, bankRect);
      });
      rafId = requestAnimationFrame(animate);
    });
  }

  function createCard(text, idx, bankRect){
    const el = document.createElement('div');
    el.className = 'word-card ' + COLOR_CLASSES[idx % COLOR_CLASSES.length];
    el.textContent = text;
    el.setAttribute('draggable', 'false');
    wordBank.appendChild(el);

    // measure
    const w = el.offsetWidth;
    const h = el.offsetHeight;
    const maxX = Math.max(10, bankRect.width - w - 10);
    const maxY = Math.max(10, bankRect.height - h - 10);

    const x = 10 + Math.random() * maxX;
    const y = 10 + Math.random() * maxY;

    const speed = 0.5 + Math.random() * 1.3; // px per frame baseline
    const angle = Math.random() * Math.PI * 2;

    const card = {
      id: 'card_' + idx + '_' + Math.random().toString(36).slice(2,7),
      text, el, x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      w, h,
      placed: false
    };

    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.dataset.id = card.id;

    attachDragHandlers(card);
    cards.push(card);
  }

  // ---------- Animation: bounce inside word bank ----------
  function animate(){
    const bankRect = wordBank.getBoundingClientRect();
    cards.forEach(card => {
      if(card.placed || card.dragging) return;
      card.x += card.vx;
      card.y += card.vy;

      const maxX = bankRect.width - card.w - 6;
      const maxY = bankRect.height - card.h - 6;

      if(card.x <= 6){ card.x = 6; card.vx = Math.abs(card.vx); }
      if(card.x >= maxX){ card.x = maxX; card.vx = -Math.abs(card.vx); }
      if(card.y <= 6){ card.y = 6; card.vy = Math.abs(card.vy); }
      if(card.y >= maxY){ card.y = maxY; card.vy = -Math.abs(card.vy); }

      card.el.style.left = card.x + 'px';
      card.el.style.top = card.y + 'px';
    });
    rafId = requestAnimationFrame(animate);
  }

  // ---------- Drag handlers (pointer events: mouse + touch) ----------
  function attachDragHandlers(card){
    const el = card.el;

    el.addEventListener('pointerdown', (e) => {
      if(answered) return;
      e.preventDefault();
      card.dragging = true;
      el.classList.add('dragging');
      el.setPointerCapture(e.pointerId);

      const bankRect = wordBank.getBoundingClientRect();
      let offsetX, offsetY, container, containerRect;

      function getContainerInfo(clientX, clientY){
        const az = answerZone.getBoundingClientRect();
        const over = clientX >= az.left && clientX <= az.right && clientY >= az.top && clientY <= az.bottom;
        return { over, az };
      }

      // initial offset relative to card's current rendered position
      const elRect = el.getBoundingClientRect();
      offsetX = e.clientX - elRect.left;
      offsetY = e.clientY - elRect.top;

      function onMove(ev){
        const { over, az } = getContainerInfo(ev.clientX, ev.clientY);
        answerZone.classList.toggle('drag-over', over && !answered);

        if(card.placed) return; // shouldn't happen mid-drag, but guard

        // Move element with fixed positioning logic relative to wordBank for visual continuity
        // We use position fixed-style by translating within whichever parent it's currently in.
        const parent = el.parentElement;
        const parentRect = parent.getBoundingClientRect();
        let nx = ev.clientX - parentRect.left - offsetX;
        let ny = ev.clientY - parentRect.top - offsetY;
        el.style.left = nx + 'px';
        el.style.top = ny + 'px';
      }

      function onUp(ev){
        el.releasePointerCapture(e.pointerId);
        el.removeEventListener('pointermove', onMove);
        el.removeEventListener('pointerup', onUp);
        card.dragging = false;
        el.classList.remove('dragging');
        answerZone.classList.remove('drag-over');

        const { over } = getContainerInfo(ev.clientX, ev.clientY);

        if(over && !card.placed && !answered){
          placeCardInAnswer(card);
        } else if(!card.placed){
          // snap back into bank bounds if dropped outside (e.g. dragged outside window)
          const bRect = wordBank.getBoundingClientRect();
          const elRect2 = el.getBoundingClientRect();
          let bx = elRect2.left - bRect.left;
          let by = elRect2.top - bRect.top;
          bx = Math.max(6, Math.min(bx, bRect.width - card.w - 6));
          by = Math.max(6, Math.min(by, bRect.height - card.h - 6));
          card.x = bx;
          card.y = by;
          if(el.parentElement !== wordBank){
            wordBank.appendChild(el);
          }
          el.style.left = bx + 'px';
          el.style.top = by + 'px';
        }
      }

      el.addEventListener('pointermove', onMove);
      el.addEventListener('pointerup', onUp);
    });
  }

  function placeCardInAnswer(card){
    card.placed = true;
    card.el.classList.add('placed');
    card.el.style.position = 'relative';
    card.el.style.left = '0';
    card.el.style.top = '0';
    card.el.style.cursor = 'default';

    answerPlaceholder.style.display = 'none';
    answerZone.appendChild(card.el);
    placedWords.push(card);

    // Allow removing a placed word by clicking it (sends it back to the bank)
    card.el.addEventListener('click', () => {
      if(answered) return;
      returnCardToBank(card);
    }, { once: true });
  }

  function returnCardToBank(card){
    card.placed = false;
    card.el.classList.remove('placed');
    card.el.style.position = 'absolute';

    const bankRect = wordBank.getBoundingClientRect();
    const x = 10 + Math.random() * Math.max(10, bankRect.width - card.w - 20);
    const y = 10 + Math.random() * Math.max(10, bankRect.height - card.h - 20);
    card.x = x; card.y = y;
    wordBank.appendChild(card.el);
    card.el.style.left = x + 'px';
    card.el.style.top = y + 'px';

    placedWords = placedWords.filter(c => c.id !== card.id);
    if(placedWords.length === 0) answerPlaceholder.style.display = 'block';
  }

  // ---------- Check answer ----------
  checkBtn.addEventListener('click', () => {
    const qData = QUESTIONS[order[qIndex]];
    const correctSentence = qData.words.join(' ');
    const userSentence = placedWords.map(c => c.text).join(' ');

    if(placedWords.length === 0){
      feedback.textContent = "Drag some words into the box first! 🧐";
      feedback.className = 'feedback';
      return;
    }

    answered = true;
    checkBtn.disabled = true;

    if(userSentence === correctSentence){
      score++;
      scoreLabel.textContent = 'Score: ' + score;
      feedback.textContent = "🎉 Correct! Great job!";
      feedback.className = 'feedback correct';
      answerZone.classList.add('correct');
    } else {
      feedback.textContent = "❌ Not quite. Correct answer: " + correctSentence;
      feedback.className = 'feedback incorrect';
      answerZone.classList.add('incorrect');
    }
    nextBtn.disabled = false;
  });

  // ---------- Reset current question (or restart whole game if finished) ----------
  resetBtn.addEventListener('click', () => {
    if(qIndex >= QUESTIONS.length){
      qIndex = 0;
      score = 0;
      order = shuffleIndices(QUESTIONS.length);
      scoreLabel.textContent = 'Score: 0';
    }
    loadQuestion();
  });

  // ---------- Next question ----------
  nextBtn.addEventListener('click', () => {
    qIndex++;
    if(qIndex >= QUESTIONS.length){
      showFinalScreen();
      return;
    }
    loadQuestion();
  });

  function showFinalScreen(){
    cancelAnimationFrame(rafId);
    wordBank.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:white;font-family:'Baloo 2',sans-serif;font-size:20px;font-weight:700;text-align:center;padding:0 20px;">
      🏆 All done! Final score: ${score} / ${QUESTIONS.length}
    </div>`;
    answerZone.innerHTML = '';
    answerZone.classList.remove('correct','incorrect');
    const az = document.createElement('span');
    az.className = 'placeholder';
    az.textContent = score === QUESTIONS.length
      ? "Perfect score! You're a 'be going to' superstar! 🌟"
      : "Nice work! Click Reset to play again from the start.";
    answerZone.appendChild(az);
    feedback.textContent = '';
    checkBtn.disabled = true;
    nextBtn.disabled = true;
    progressLabel.textContent = `Finished! ${QUESTIONS.length} of ${QUESTIONS.length}`;
  }

  // ---------- Init ----------
  loadQuestion();

  window.addEventListener('resize', () => {
    // keep cards within bounds on resize
    const bankRect = wordBank.getBoundingClientRect();
    cards.forEach(card => {
      if(card.placed) return;
      const maxX = Math.max(6, bankRect.width - card.w - 6);
      const maxY = Math.max(6, bankRect.height - card.h - 6);
      card.x = Math.min(card.x, maxX);
      card.y = Math.min(card.y, maxY);
    });
  });
})();
</script>

</body>
</html>
